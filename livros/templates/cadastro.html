<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Minha Biblioteca</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#121212,#1DB954);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card-login{
            width:450px;
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(15px);
            border-radius:20px;
            padding:40px;
            color:white;
            box-shadow:0 8px 32px rgba(0,0,0,.3);
        }

        .logo{
            font-size:4rem;
        }

        .btn-custom{
            background:#1DB954;
            border:none;
        }

        .btn-custom:hover{
            background:#18a64c;
        }

        a{
            color:#1DB954;
            text-decoration:none;
        }

        a:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>

<div class="card-login">

    <div class="text-center mb-4">
        <div class="logo">📚</div>
        <h2>Minha Biblioteca</h2>
        <p>Crie sua conta</p>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label>Usuário</label>
            {{ form.username }}
        </div>

        <div class="mb-3">
            <label>E-mail</label>
            {{ form.email }}
        </div>

        <div class="mb-3">
            <label>Senha</label>
            {{ form.password1 }}
        </div>

        <div class="mb-3">
            <label>Confirmar Senha</label>
            {{ form.password2 }}
        </div>

        {% if form.errors %}
        <div class="alert alert-danger">
            {{ form.errors }}
        </div>
        {% endif %}

        <button type="submit" class="btn btn-custom w-100">
            Criar Conta
        </button>
    </form>

    <hr>

    <div class="text-center">
        Já possui conta?
        <a href="/accounts/login/">Entrar</a>
    </div>

</div>

</body>
</html>
