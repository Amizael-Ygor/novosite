<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Biblioteca Pessoal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f5f6fa;
        }

        .card-dashboard{
            border:none;
            border-radius:15px;
            transition:.3s;
        }

        .card-dashboard:hover{
            transform:translateY(-5px);
        }

        .sidebar{
            min-height:100vh;
            background:#212529;
            color:white;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:12px;
        }

        .sidebar a:hover{
            background:#343a40;
        }
    </style>
</head>
<body>

<div class="container-fluid">

<div class="row">

    <div class="col-md-2 sidebar">

        <h3 class="mt-3 text-center">📚 Biblioteca</h3>

        <hr>

        <a href="{% url 'dashboard' %}" style="background:#007bff;">🏠 Dashboard</a>
        <a href="{% url 'meus_livros' %}">📖 Meus Livros</a>
        <a href="{% url 'favoritos' %}">⭐ Favoritos</a>
        <a href="{% url 'metas' %}">🎯 Metas</a>

    </div>

    <div class="col-md-10">

        <div class="p-4">

            <h1>Minha Biblioteca Pessoal</h1>

            <div class="row mt-4">

                <div class="col-md-3">
                    <div class="card card-dashboard shadow">
                        <div class="card-body">
                            <h2>0</h2>
                            <p>Total de Livros</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card card-dashboard shadow">
                        <div class="card-body">
                            <h2>0</h2>
                            <p>Lendo</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card card-dashboard shadow">
                        <div class="card-body">
                            <h2>0</h2>
                            <p>Concluídos</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card card-dashboard shadow">
                        <div class="card-body">
                            <h2>0</h2>
                            <p>Favoritos</p>
                        </div>
                    </div>
                </div>

            </div>

            <div class="card mt-4 shadow">
                <div class="card-body">

                    <h4>Bem-vindo!</h4>

                    <p>
                        Gerencie seus livros, acompanhe leituras,
                        registre avaliações e acompanhe suas metas.
                    </p>

                </div>
            </div>

        </div>

    </div>

</div>

</div>

</body>
</html>
